<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paper Trail</title>
<link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="scanline" hidden></div>

  <header>
    <div class="brand">
      <span class="mark"></span>
      <h1>Paper&nbsp;Trail</h1>
    </div>
    <button id="btnOptions" class="ghost" title="Settings">⚙</button>
  </header>

  <nav class="tabs">
    <button id="tabBtnRecorder" data-tab="recorder" class="active">Recorder</button>
    <button id="tabBtnLibrary" data-tab="library">Library</button>
  </nav>

  <div id="tab-recorder">
    <section class="controls">
      <button id="btnRecord" class="primary">● Start recording</button>
      <button id="btnCapture" class="ghost" title="Alt+Shift+C">+ Capture screen</button>
      <button id="btnClear" class="ghost danger" title="Discard session">Clear</button>
    </section>

    <section class="controls">
      <button id="btnNative" class="ghost" title="Recommended on Windows: semantic desktop capture — every click, real labels, automation-ready anchors (see native-host/)">⚡ UIA companion</button>
      <button id="btnDesktop" class="ghost" title="Fallback, no install: vision-based window recording — pair with 'Caption desktop frames at capture' in options">🖥 Record a window</button>
      <button id="btnMic" class="ghost" title="Narrate while recording — transcribed via your configured Whisper endpoint; audio is never stored">🎤 Narrate</button>
      <button id="btnSave" class="ghost" title="Save this session to the library" disabled>💾 Save</button>
    </section>

    <div id="deskStatus" class="status desk" hidden></div>
    <div id="micStatus" class="status desk" hidden></div>

    <div id="status" class="status">Idle — nothing recorded</div>

    <section id="steps" class="steps"></section>
  </div>

  <div id="tab-library" hidden>
    <div id="libStatus" class="status">Library — saved recordings live in this browser profile only.</div>
    <section id="libList" class="steps"></section>
    <section id="libDetail" class="lib-detail" hidden></section>
  </div>

  <section class="generate">
    <div id="genSource" class="status" hidden></div>
    <select id="genTarget" title="Output type">
      <option value="sop">SOP document (Markdown)</option>
      <option value="powershell">PowerShell automation (.ps1)</option>
      <option value="psweb">PowerShell web — HTTP only (.ps1)</option>
      <option value="playwright">Playwright script (.spec.js)</option>
      <option value="pwtest">Playwright regression test (.spec.js)</option>
      <option value="aa">Automation Anywhere build sheet</option>
    </select>
    <textarea id="context" rows="2" placeholder="Optional context: purpose, audience, system name…"></textarea>
    <label id="ssRow" class="ss-row" hidden title="Generated script sources every credential from Delinea Secret Server (on-prem REST API) and, for password changes, writes the rotated password back">
      <input type="checkbox" id="useSS"> 🔐 Credentials via Delinea Secret Server
    </label>
    <button id="btnGenerate" class="primary wide">Generate SOP</button>
    <button id="btnAudit" class="ghost wide" title="Build the exact request locally — nothing is sent anywhere">🔍 Preview what will be sent</button>
    <div id="genStatus" class="status" hidden></div>
  </section>

  <section id="result" class="result" hidden>
    <div class="result-bar">
      <span>Draft</span>
      <div class="result-actions">
        <button id="btnEdit" class="ghost">Edit</button>
        <button id="btnCopy" class="ghost">Copy</button>
        <button id="btnDlMd" class="ghost">.md</button>
        <button id="btnDlHtml" class="ghost">.html</button>
        <button id="btnDlPs1" class="ghost" hidden>.ps1</button>
        <button id="btnDlJson" class="ghost" hidden>.json</button>
      </div>
    </div>
    <textarea id="editor" hidden></textarea>
    <article id="preview"></article>
  </section>

  <script src="common.js"></script>
  <script src="db.js"></script>
  <script src="sidepanel.js"></script>
  <script src="library.js"></script>
  <script src="verify.js"></script>
  <script src="walkthrough.js"></script>
  <script src="autopilot.js"></script>
  <script src="diff.js"></script>
</body>
</html>
