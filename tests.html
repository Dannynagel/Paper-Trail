<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paper Trail — pure-logic tests</title>
<style>
body { font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace; background: #0E1116; color: #DEE4EC; padding: 24px; }
.pass { color: #4FD6C4; }
.fail { color: #FF4757; font-weight: 700; }
h1 { font-size: 15px; }
</style>
</head>
<body>
<h1>Paper Trail — pure-logic tests (open this file in any browser)</h1>
<div id="out"></div>

<script src="common.js"></script>
<script>
const out = document.getElementById("out");
let passed = 0, failed = 0;

function eq(name, actual, expected) {
  const ok = JSON.stringify(actual) === JSON.stringify(expected);
  ok ? passed++ : failed++;
  const line = document.createElement("div");
  line.className = ok ? "pass" : "fail";
  line.textContent = `${ok ? "✓" : "✗"} ${name}` +
    (ok ? "" : ` — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  out.appendChild(line);
}

// ── normLabel ────────────────────────────────────────────────────────────
eq("normLabel collapses whitespace + case", PTCommon.normLabel("  Save\n  Order "), "save order");
eq("normLabel strips truncation ellipsis", PTCommon.normLabel("Submit the quarterly…"), "submit the quarterly");
eq("normLabel handles empty/null", PTCommon.normLabel(null), "");

// ── labelMatches ─────────────────────────────────────────────────────────
eq("labelMatches exact after normalization", PTCommon.labelMatches("Save  Order", "save order"), true);
eq("labelMatches rejects different labels", PTCommon.labelMatches("Save Order", "Delete Order"), false);
eq("labelMatches tolerates 80-char truncation",
  PTCommon.labelMatches(
    "Approve the request and forward it to the regional compliance officer for review",
    "Approve the request and forward it to the regional compliance officer f…"), true);
eq("labelMatches rejects short prefix collisions", PTCommon.labelMatches("Save", "Save Order"), false);
eq("labelMatches rejects empty sides", PTCommon.labelMatches("", "Save"), false);

// ── anchorList ───────────────────────────────────────────────────────────
eq("anchorList orders by trust: testAttr > id > attr > selector > css",
  PTCommon.anchorList({
    selector: "#btn",
    anchors: { testAttr: '[data-testid="go"]', id: "#go", attr: 'button[name="go"]', css: "div > button" }
  }),
  ['[data-testid="go"]', "#go", 'button[name="go"]', "#btn", "div > button"]);
eq("anchorList dedupes repeats",
  PTCommon.anchorList({ selector: "#go", anchors: { id: "#go", css: "div > button" } }),
  ["#go", "div > button"]);
eq("anchorList legacy step degrades to [selector]",
  PTCommon.anchorList({ selector: "#btn" }), ["#btn"]);
eq("anchorList empty step", PTCommon.anchorList({}), []);
eq("anchorList null step", PTCommon.anchorList(null), []);

// ── samePage / sameOrigin ────────────────────────────────────────────────
eq("samePage ignores query and hash",
  PTCommon.samePage("https://a.com/x?q=1#top", "https://a.com/x?q=2"), true);
eq("samePage ignores trailing slash",
  PTCommon.samePage("https://a.com/x/", "https://a.com/x"), true);
eq("samePage rejects different paths",
  PTCommon.samePage("https://a.com/x", "https://a.com/y"), false);
eq("samePage rejects different origins",
  PTCommon.samePage("https://a.com/x", "https://b.com/x"), false);
eq("samePage tolerates invalid URLs", PTCommon.samePage("not a url", "https://a.com"), false);
eq("sameOrigin ignores path", PTCommon.sameOrigin("https://a.com/x", "https://a.com/y"), true);
eq("urlHost extracts host", PTCommon.urlHost("https://portal.example.com:8443/a"), "portal.example.com:8443");
eq("urlHost tolerates junk", PTCommon.urlHost("nope"), "");

// ── summarizeVerify ──────────────────────────────────────────────────────
eq("summarizeVerify all healthy",
  PTCommon.summarizeVerify(["found", "found", "na"]), "2/2 anchors healthy");
eq("summarizeVerify mixed",
  PTCommon.summarizeVerify(["found", "fallback", "missing", "unreachable", "na"]),
  "1/4 anchors healthy — 1 drifted, 1 missing, 1 unreachable");
eq("summarizeVerify nothing verifiable",
  PTCommon.summarizeVerify(["na", "na"]), "no verifiable steps");
eq("summarizeVerify unknown grades count as na",
  PTCommon.summarizeVerify(["pending", "found"]), "1/1 anchors healthy");

// ── diffSteps / summarizeDiff ────────────────────────────────────────────
const mk = (type, kind, label, extra) => Object.assign({ type, kind, label, text: label, n: 0 }, extra);
const ops = (es) => es.map(e => e.op);

eq("diff identical lists → all unchanged",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Save"), mk("input", "text", "Name")],
    [mk("click", "button", "Save"), mk("input", "text", "Name")])),
  ["unchanged", "unchanged"]);
eq("diff pure add",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Save")],
    [mk("click", "button", "Save"), mk("click", "button", "Archive")])),
  ["unchanged", "added"]);
eq("diff pure remove",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Save"), mk("click", "button", "Archive")],
    [mk("click", "button", "Save")])),
  ["unchanged", "removed"]);
eq("diff relabel pairs similar labels of same type+kind",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Submit Order")],
    [mk("click", "button", "Submit Purchase Order")])),
  ["relabeled"]);
eq("diff does NOT pair unrelated adjacent add+remove",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Cancel")],
    [mk("click", "button", "Help")])),
  ["removed", "added"]);
eq("diff reorder reads as removed + added",
  ops(PTCommon.diffSteps(
    [mk("click", "button", "Alpha"), mk("click", "button", "Beta")],
    [mk("click", "button", "Beta"), mk("click", "button", "Alpha")])).sort(),
  ["added", "removed", "unchanged"]);
eq("diff flags sub-changes on unchanged steps",
  PTCommon.diffSteps(
    [mk("click", "button", "Save", { selector: "#a", url: "https://x.com/p1" })],
    [mk("click", "button", "Save", { selector: "#b", url: "https://x.com/p2" })]
  )[0].anchorsChanged, true);
eq("diff empty inputs", PTCommon.diffSteps([], []), []);
eq("summarizeDiff counts",
  PTCommon.summarizeDiff([{ op: "unchanged" }, { op: "unchanged" }, { op: "relabeled" }, { op: "added" }, { op: "removed" }]),
  "2 unchanged, 1 relabeled, 1 added, 1 removed");
eq("summarizeDiff identical", PTCommon.summarizeDiff([{ op: "unchanged" }]), "1 unchanged");

// ── mapNarration ─────────────────────────────────────────────────────────
// Audio starts at t=1000ms; steps at 3000 and 8000.
const narrSteps = [{ id: "s1", ts: 3000 }, { id: "s2", ts: 8000 }];
eq("narration segment after a step attaches to it",
  PTCommon.mapNarration([{ start: 3, end: 5, text: "now save it" }], narrSteps, 1000),
  [{ id: "s1", narration: "now save it" }]); // ends at 1000+5000=6000 → latest step ≤ 6000 is s1
eq("narration before the first step attaches to step 1",
  PTCommon.mapNarration([{ start: 0, end: 1, text: "first we open the form" }], narrSteps, 1000),
  [{ id: "s1", narration: "first we open the form" }]);
eq("narration in a later gap attaches to the previous step",
  PTCommon.mapNarration([{ start: 8, end: 10, text: "then submit" }], narrSteps, 1000),
  [{ id: "s2", narration: "then submit" }]); // ends at 11000 → s2
eq("multi-segment concatenation per step",
  PTCommon.mapNarration([
    { start: 3, end: 4, text: "check the value" },
    { start: 4.5, end: 5.5, text: "before saving" }
  ], narrSteps, 1000),
  [{ id: "s1", narration: "check the value before saving" }]);
eq("empty segments → empty result", PTCommon.mapNarration([], narrSteps, 1000), []);
eq("blank text segments are dropped",
  PTCommon.mapNarration([{ start: 3, end: 5, text: "   " }], narrSteps, 1000), []);

// ── auditStats ───────────────────────────────────────────────────────────
const steps = [
  { n: 1, label: "Username", masked: false, shot: "data:image/jpeg;base64,x" },
  { n: 2, label: "Password", masked: true, hasShot: true },
  { n: 3, label: "Sign in", masked: false, narration: "click it" },
  { n: 4, type: "desktop", hasShot: true, caption: "Click Save in the Orders window" },
  { n: 5, type: "click", caption: "should not count — not a desktop step" },
  { n: 6, type: "input", label: "Employee ID", param: "EMPLOYEE_ID" }
];
eq("auditStats masked steps", PTCommon.auditStats(steps).maskedSteps, [{ n: 2, label: "Password" }]);
eq("auditStats shot steps (inline + IDB)", PTCommon.auditStats(steps).shotSteps, [1, 2, 4]);
eq("auditStats narrated steps", PTCommon.auditStats(steps).narratedSteps, [3]);
eq("auditStats captioned desktop steps only", PTCommon.auditStats(steps).captionedSteps, [4]);
eq("auditStats run-time parameters", PTCommon.auditStats(steps).paramSteps, [{ n: 6, param: "EMPLOYEE_ID" }]);
eq("auditStats step count", PTCommon.auditStats(steps).stepCount, 6);

// ── summarizeRun (evidence run outcome line) ─────────────────────────────
const runSteps = (...statuses) => statuses.map((status, i) => ({ n: i + 1, status }));
eq("summarizeRun counts executed = done + confirmed",
  PTCommon.summarizeRun(runSteps("done", "confirmed", "done")), "3 executed");
eq("summarizeRun full mix",
  PTCommon.summarizeRun(runSteps("done", "manual", "skipped", "failed")),
  "1 executed, 1 manual, 1 skipped, 1 failed");
eq("summarizeRun empty", PTCommon.summarizeRun([]), "no steps");
eq("summarizeRun null", PTCommon.summarizeRun(null), "no steps");
eq("summarizeRun ignores unknown statuses",
  PTCommon.summarizeRun(runSteps("done", "pending")), "1 executed");

// ── parseCsv (runs table) ────────────────────────────────────────────────
eq("parseCsv plain rows",
  PTCommon.parseCsv("A,B\n1,2\n3,4"),
  { headers: ["A", "B"], rows: [["1", "2"], ["3", "4"]] });
eq("parseCsv quoted field keeps its comma",
  PTCommon.parseCsv('NAME,CITY\n"Doe, Jane",Berlin'),
  { headers: ["NAME", "CITY"], rows: [["Doe, Jane", "Berlin"]] });
eq("parseCsv escaped quotes",
  PTCommon.parseCsv('Q\n"say ""hi"" now"'),
  { headers: ["Q"], rows: [['say "hi" now']] });
eq("parseCsv CRLF line endings",
  PTCommon.parseCsv("A,B\r\n1,2\r\n"),
  { headers: ["A", "B"], rows: [["1", "2"]] });
eq("parseCsv quoted field spanning a newline",
  PTCommon.parseCsv('A,B\n"line1\nline2",x'),
  { headers: ["A", "B"], rows: [["line1\nline2", "x"]] });
eq("parseCsv ragged rows preserved for the caller to reject",
  PTCommon.parseCsv("A,B\n1\n1,2,3"),
  { headers: ["A", "B"], rows: [["1"], ["1", "2", "3"]] });
eq("parseCsv trims headers, keeps values verbatim",
  PTCommon.parseCsv(" A , B \n x , y "),
  { headers: ["A", "B"], rows: [[" x ", " y "]] });
eq("parseCsv skips blank lines",
  PTCommon.parseCsv("A\n\n1\n\n"),
  { headers: ["A"], rows: [["1"]] });
eq("parseCsv empty input", PTCommon.parseCsv(""), { headers: [], rows: [] });

const h = document.createElement("h1");
h.className = failed ? "fail" : "pass";
h.textContent = `${passed} passed, ${failed} failed`;
out.prepend(h);
</script>
</body>
</html>
